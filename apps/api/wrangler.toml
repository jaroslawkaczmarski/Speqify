name = "speqify-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# Bindings. Secrets (SUPERADMIN_*, SESSION_SECRET) are NOT here — local dev via
# apps/api/.dev.vars, production via Cloudflare Secrets Store (§9).
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "speqify"
database_id = "61034a64-138c-4c1a-9c85-7cde9af9c600"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "speqify-media"

# Phase 6 transcription queue. Queues are on the Free plan since 2026-02-04;
# Workers Paid (active) only raises CPU/invocation + retention headroom.
[[queues.producers]]
binding = "TRANSCRIPTION_QUEUE"
queue = "speqify-transcription"

[[queues.consumers]]
queue = "speqify-transcription"
max_batch_size = 10

# Default Whisper transcription (Workers AI).
[ai]
binding = "AI"

[observability]
enabled = true

[env.staging]
name = "speqify-api-staging"

[env.production]
name = "speqify-api-production"
