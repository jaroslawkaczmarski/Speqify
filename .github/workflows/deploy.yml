name: Deploy

# Auto-deploy all three apps to Cloudflare on every push to main.
#   apps/api    -> Worker  speqify-api      (api.speqify.app)
#   apps/landing-> Pages   speqify-landing  (speqify.app)
#   apps/panel  -> Pages   speqify-panel    (admin.speqify.app)
#
# The Pages projects are Direct-Upload (cannot be Git-connected in the
# dashboard), so they are deployed here via `wrangler pages deploy`.
#
# Required repo secret: CLOUDFLARE_API_TOKEN — scopes:
#   Account: Workers Scripts:Edit, Cloudflare Pages:Edit,
#            Account Settings:Read, D1:Edit
#   User:    User Details:Read
# (Zone scopes are NOT needed — the api.speqify.app custom domain is a
#  one-time, sticky resource and is not re-asserted on deploy.)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck + test (API)
        run: |
          pnpm --filter @speqify/api typecheck
          pnpm --filter @speqify/api test
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: deploy

  web:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VITE_API_BASE: https://api.speqify.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build landing + panel
        run: |
          pnpm --filter @speqify/landing build
          pnpm --filter @speqify/panel build
      - name: Deploy landing (Pages)
        run: npx wrangler pages deploy apps/landing/dist --project-name=speqify-landing --branch=main --commit-dirty=true
      - name: Deploy panel (Pages)
        run: npx wrangler pages deploy apps/panel/dist --project-name=speqify-panel --branch=main --commit-dirty=true
