name: Deploy API

# Auto-deploy the Cloudflare Worker (apps/api) on every push to main.
# Static apps (landing/panel) deploy via Cloudflare Pages' own Git
# integration — see DEPLOYMENT.md.
#
# Required repo secret: CLOUDFLARE_API_TOKEN
#   Token scopes: Workers Scripts:Edit, Workers Routes:Edit, D1:Edit,
#   Account Settings:Read, and Zone DNS:Edit on speqify.app (for the
#   api.speqify.app custom domain).

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck + test (API)
        run: |
          pnpm --filter @speqify/api typecheck
          pnpm --filter @speqify/api test

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/api
          command: deploy
